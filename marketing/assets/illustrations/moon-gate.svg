<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" fill="none">
  <!-- garden wall -->
  <rect x="0" y="20" width="200" height="60" stroke="none" fill="#2a2a2a" fill-opacity="0.04"/>
  <line x1="0" y1="20" x2="200" y2="20" stroke="#2a2a2a" stroke-width="0.8"/>
  <line x1="0" y1="80" x2="200" y2="80" stroke="#2a2a2a" stroke-width="0.6"/>
  <!-- wall tile cap -->
  <path d="M0 18 Q10 14 20 18 Q30 14 40 18 Q50 14 60 18 Q70 14 80 18 Q90 14 100 18 Q110 14 120 18 Q130 14 140 18 Q150 14 160 18 Q170 14 180 18 Q190 14 200 18" stroke="#2a2a2a" stroke-width="0.5"/>
  <!-- circular moon gate opening -->
  <circle cx="100" cy="52" r="30" stroke="#2a2a2a" stroke-width="1.4"/>
  <!-- inner gate: clear the wall fill — use white fill to punch through -->
  <circle cx="100" cy="52" r="29" stroke="none" fill="white"/>
  <!-- gate threshold step -->
  <rect x="72" y="78" width="56" height="4" stroke="#2a2a2a" stroke-width="0.5" fill="#2a2a2a" fill-opacity="0.03"/>
  <!-- view through gate: distant garden -->
  <!-- far mountain seen through gate -->
  <path d="M78 42 Q88 28 100 36 Q112 26 122 42" stroke="#2a2a2a" stroke-width="0.4" opacity="0.5"/>
  <!-- garden path through gate -->
  <path d="M92 80 Q96 68 100 62 Q104 68 108 80" stroke="#2a2a2a" stroke-width="0.5" opacity="0.6"/>
  <!-- stepping stones on path -->
  <ellipse cx="97" cy="74" rx="2.5" ry="1" stroke="#2a2a2a" stroke-width="0.4" opacity="0.4"/>
  <ellipse cx="103" cy="70" rx="2" ry="0.8" stroke="#2a2a2a" stroke-width="0.4" opacity="0.4"/>
  <ellipse cx="99" cy="66" rx="2" ry="0.8" stroke="#2a2a2a" stroke-width="0.3" opacity="0.35"/>
  <!-- small tree through gate -->
  <path d="M112 60 L112 44" stroke="#2a2a2a" stroke-width="0.6" opacity="0.5"/>
  <path d="M112 44 Q108 38 104 40" stroke="#2a2a2a" stroke-width="0.4" opacity="0.4"/>
  <path d="M112 46 Q116 40 120 42" stroke="#2a2a2a" stroke-width="0.4" opacity="0.4"/>
  <circle cx="106" cy="38" r="3" stroke="#2a2a2a" stroke-width="0.3" fill="#2a2a2a" fill-opacity="0.04" opacity="0.5"/>
  <circle cx="118" cy="40" r="2.5" stroke="#2a2a2a" stroke-width="0.3" fill="#2a2a2a" fill-opacity="0.04" opacity="0.5"/>
  <!-- bamboo beside gate (left) -->
  <line x1="58" y1="80" x2="58" y2="12" stroke="#2a2a2a" stroke-width="0.6"/>
  <line x1="58" y1="28" x2="58" y2="28" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="58" y1="44" x2="58" y2="44" stroke="#2a2a2a" stroke-width="1.2"/>
  <path d="M58 24 Q50 20 46 16" stroke="#2a2a2a" stroke-width="0.35"/>
  <path d="M58 26 Q52 24 48 20" stroke="#2a2a2a" stroke-width="0.3"/>
  <path d="M58 40 Q52 36 48 32" stroke="#2a2a2a" stroke-width="0.35"/>
  <!-- bamboo (right) -->
  <line x1="144" y1="80" x2="144" y2="14" stroke="#2a2a2a" stroke-width="0.5"/>
  <path d="M144 30 Q150 26 154 22" stroke="#2a2a2a" stroke-width="0.35"/>
  <path d="M144 44 Q150 40 156 38" stroke="#2a2a2a" stroke-width="0.3"/>
  <!-- wall texture lines -->
  <line x1="20" y1="36" x2="38" y2="36" stroke="#2a2a2a" stroke-width="0.2" opacity="0.2"/>
  <line x1="15" y1="50" x2="32" y2="50" stroke="#2a2a2a" stroke-width="0.2" opacity="0.2"/>
  <line x1="10" y1="64" x2="28" y2="64" stroke="#2a2a2a" stroke-width="0.2" opacity="0.2"/>
  <line x1="160" y1="40" x2="180" y2="40" stroke="#2a2a2a" stroke-width="0.2" opacity="0.2"/>
  <line x1="165" y1="56" x2="185" y2="56" stroke="#2a2a2a" stroke-width="0.2" opacity="0.2"/>
  <line x1="155" y1="68" x2="178" y2="68" stroke="#2a2a2a" stroke-width="0.2" opacity="0.2"/>
  <!-- ground plane -->
  <path d="M0 86 Q50 84 100 86 Q150 84 200 86" stroke="#2a2a2a" stroke-width="0.3" opacity="0.3"/>
</svg>
