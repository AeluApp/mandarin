<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" fill="none" stroke="black">
  <!-- horizon -->
  <line x1="0" y1="50" x2="120" y2="50" stroke-width="0.4"/>
  <!-- origami crane -->
  <!-- body center diamond -->
  <polyline points="50,28 60,22 70,28 60,34 50,28" stroke-width="0.6"/>
  <!-- left wing -->
  <line x1="50" y1="28" x2="32" y2="18" stroke-width="0.6"/>
  <line x1="32" y1="18" x2="50" y2="24" stroke-width="0.5"/>
  <!-- right wing -->
  <line x1="70" y1="28" x2="88" y2="18" stroke-width="0.6"/>
  <line x1="88" y1="18" x2="70" y2="24" stroke-width="0.5"/>
  <!-- tail -->
  <line x1="60" y1="34" x2="52" y2="42" stroke-width="0.5"/>
  <!-- head/neck -->
  <line x1="60" y1="22" x2="64" y2="14" stroke-width="0.5"/>
  <line x1="64" y1="14" x2="67" y2="16" stroke-width="0.4"/>
</svg>
