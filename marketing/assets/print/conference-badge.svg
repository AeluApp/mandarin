<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 450">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&amp;family=Source+Serif+4:wght@400&amp;family=Noto+Serif+SC:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="350" height="450" fill="#F2EBE0"/>

  <!-- Top section: brand -->
  <text x="32" y="60" font-family="'Noto Serif SC', serif" font-weight="700" font-size="40" fill="#946070">漫</text>
  <text x="80" y="54" font-family="'Cormorant Garamond', serif" font-weight="600" font-size="24" fill="#2A3650">Aelu</text>

  <!-- Horizon line -->
  <line x1="32" y1="90" x2="318" y2="90" stroke="#D8D0C4" stroke-width="1"/>

  <!-- Middle section: attendee info -->
  <text x="175" y="200" font-family="'Cormorant Garamond', serif" font-weight="600" font-size="32" fill="#2A3650" text-anchor="middle">[Attendee Name]</text>
  <text x="175" y="236" font-family="'Source Serif 4', serif" font-weight="400" font-size="16" fill="#5A6678" text-anchor="middle">[Title]</text>

  <!-- Lower horizon line -->
  <line x1="32" y1="360" x2="318" y2="360" stroke="#D8D0C4" stroke-width="1"/>

  <!-- Bottom section -->
  <text x="175" y="394" font-family="'Source Serif 4', serif" font-weight="400" font-size="12" fill="#5A6678" text-anchor="middle">aelu.app</text>
  <text x="175" y="416" font-family="'Source Serif 4', serif" font-weight="400" font-size="11" fill="#5A6678" text-anchor="middle">Patient Chinese study</text>
</svg>
