<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&amp;family=Noto+Serif+SC:wght@700&amp;display=swap');
    </style>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="100"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circle-clip)">
    <!-- Background circle -->
    <circle cx="100" cy="100" r="100" fill="#F2EBE0"/>

    <!-- Character -->
    <text x="100" y="100" font-family="'Noto Serif SC', serif" font-weight="700" font-size="64" fill="#946070" text-anchor="middle">漫</text>

    <!-- Horizon line -->
    <line x1="64" y1="118" x2="136" y2="118" stroke="#D8D0C4" stroke-width="1"/>

    <!-- App name -->
    <text x="100" y="142" font-family="'Cormorant Garamond', serif" font-weight="600" font-size="16" fill="#2A3650" text-anchor="middle">Mandarin</text>
  </g>
</svg>
