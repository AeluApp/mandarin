<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&amp;family=Source+Serif+4:wght@400&amp;family=Noto+Serif+SC:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="595" height="842" fill="#F2EBE0"/>

  <!-- ===== UPPER THIRD: Large character ===== -->
  <text x="297" y="260" font-family="'Noto Serif SC', serif" font-weight="700" font-size="160" fill="#946070" text-anchor="middle">漫</text>

  <!-- ===== MIDDLE: Brand text ===== -->
  <line x1="220" y1="310" x2="375" y2="310" stroke="#D8D0C4" stroke-width="1"/>

  <text x="297" y="380" font-family="'Cormorant Garamond', serif" font-weight="600" font-size="48" fill="#2A3650" text-anchor="middle">Aelu</text>
  <text x="297" y="416" font-family="'Source Serif 4', serif" font-weight="400" font-size="18" fill="#5A6678" text-anchor="middle">Patient Chinese study</text>

  <!-- ===== LOWER THIRD: Features ===== -->
  <line x1="60" y1="480" x2="535" y2="480" stroke="#D8D0C4" stroke-width="1"/>

  <!-- Feature 1 -->
  <rect x="120" y="524" width="4" height="4" fill="#946070"/>
  <text x="140" y="528" font-family="'Source Serif 4', serif" font-weight="400" font-size="16" fill="#2A3650">Zero AI. All human-curated.</text>

  <!-- Feature 2 -->
  <rect x="120" y="564" width="4" height="4" fill="#946070"/>
  <text x="140" y="568" font-family="'Source Serif 4', serif" font-weight="400" font-size="16" fill="#2A3650">12 drill types. 9 HSK levels.</text>

  <!-- Feature 3 -->
  <rect x="120" y="604" width="4" height="4" fill="#946070"/>
  <text x="140" y="608" font-family="'Source Serif 4', serif" font-weight="400" font-size="16" fill="#2A3650">Honest data. No theatrics.</text>

  <!-- ===== FOOTER ===== -->
  <line x1="60" y1="760" x2="535" y2="760" stroke="#D8D0C4" stroke-width="1"/>

  <text x="297" y="796" font-family="'Source Serif 4', serif" font-weight="400" font-size="14" fill="#5A6678" text-anchor="middle">aelu.app</text>
</svg>
