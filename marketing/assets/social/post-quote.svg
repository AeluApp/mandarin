<!-- Post template: quote. Replace placeholder text before use. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#F2EBE0"/>

  <!-- Hanzi — centered upper third -->
  <text x="540" y="340" text-anchor="middle"
        font-family="'Noto Serif SC', 'Songti SC', serif"
        font-size="96" fill="#946070" font-weight="600">
    千里之行，始于足下
  </text>

  <!-- Pinyin — below hanzi -->
  <text x="540" y="420" text-anchor="middle"
        font-family="'Source Serif 4', 'Source Serif Pro', 'Georgia', serif"
        font-size="28" fill="#2C2820" font-style="italic" opacity="0.7">
    qianli zhi xing, shi yu zu xia
  </text>

  <!-- Horizon divider -->
  <line x1="240" y1="520" x2="840" y2="520" stroke="#2C2820" stroke-width="0.75" opacity="0.25"/>

  <!-- English translation — lower third -->
  <text x="540" y="620" text-anchor="middle"
        font-family="'Source Serif 4', 'Source Serif Pro', 'Georgia', serif"
        font-size="32" fill="#2C2820">
    A journey of a thousand miles
  </text>
  <text x="540" y="668" text-anchor="middle"
        font-family="'Source Serif 4', 'Source Serif Pro', 'Georgia', serif"
        font-size="32" fill="#2C2820">
    begins with a single step.
  </text>

  <!-- Attribution -->
  <text x="1020" y="1030" text-anchor="end"
        font-family="'Cormorant Garabmond', 'Georgia', serif"
        font-size="22" fill="#2C2820" opacity="0.5" letter-spacing="1">
    明 Ming
  </text>
</svg>
