<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mandarin — Links</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Mandarin — adaptive Mandarin study. Links to the app, pricing, blog, and more.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Open Graph -->
  <meta property="og:title" content="Mandarin — Links">
  <meta property="og:description" content="Adaptive Mandarin study. Honest data, no theatrics.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mandarinapp.com/links">
  <meta property="og:image" content="https://mandarinapp.com/og-image.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Source+Serif+4:wght@400;600&family=Noto+Serif+SC:wght@700&display=swap">
  <style>
    :root {
      --color-base: #F2EBE0;
      --color-surface: #F7F1E8;
      --color-text: #2A3650;
      --color-text-faint: #8B8680;
      --color-accent: #946070;
      --color-secondary: #6A7A5A;
      --color-border: #D8D0C4;
      --font-heading: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Source Serif 4', Georgia, serif;
      --font-hanzi: 'Noto Serif SC', 'Songti SC', serif;
      --radius: 0;
      --space-2: 0.5rem; --space-3: 1rem; --space-4: 1.5rem; --space-5: 2rem; --space-6: 3rem; --space-8: 5rem;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-base: #1C2028;
        --color-surface: #242830;
        --color-text: #E4DDD0;
        --color-text-faint: #8B8680;
        --color-border: #3A3530;
        --color-accent: #B07888;
        --color-secondary: #8AAA7A;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-base);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: var(--space-6) var(--space-4);
    }

    .links-page {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Wordmark */
    .brand {
      text-align: center;
      margin-bottom: var(--space-6);
    }
    .brand-mark {
      font-family: var(--font-hanzi);
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--color-accent);
      line-height: 1;
      display: block;
      margin-bottom: var(--space-2);
    }
    .brand-wordmark {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 400;
      color: var(--color-text);
      letter-spacing: 0.15em;
    }

    /* Links */
    .links-list {
      width: 100%;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    .links-list a {
      display: block;
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background: var(--color-surface);
      border-left: 3px solid var(--color-accent);
      color: var(--color-text);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.15s;
    }
    .links-list a:hover {
      background: var(--color-border);
    }
    @media (prefers-color-scheme: dark) {
      .links-list a:hover {
        background: var(--color-border);
      }
    }
    .links-list .link-sub {
      display: block;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--color-text-faint);
      margin-top: 2px;
    }

    /* Tagline */
    .tagline {
      text-align: center;
      font-size: 0.9rem;
      color: var(--color-text-faint);
      max-width: 320px;
      line-height: 1.6;
    }

    /* Animation */
    @keyframes drift-up { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .brand { animation: drift-up 0.6s ease-out both; }
    .links-list li { animation: drift-up 0.5s ease-out both; }
    .links-list li:nth-child(1) { animation-delay: 0.05s; }
    .links-list li:nth-child(2) { animation-delay: 0.10s; }
    .links-list li:nth-child(3) { animation-delay: 0.15s; }
    .links-list li:nth-child(4) { animation-delay: 0.20s; }
    .links-list li:nth-child(5) { animation-delay: 0.25s; }
    .links-list li:nth-child(6) { animation-delay: 0.30s; }
    .links-list li:nth-child(7) { animation-delay: 0.35s; }
    .tagline { animation: drift-up 0.5s ease-out 0.4s both; }
    @media (prefers-reduced-motion: reduce) { .brand, .links-list li, .tagline { animation: none; opacity: 1; } }
  </style>
</head>
<body>

  <div class="links-page">
    <div class="brand">
      <span class="brand-mark">漫</span>
      <span class="brand-wordmark">Mandarin</span>
    </div>

    <ul class="links-list">
      <li><a href="/">Try Mandarin Free</a></li>
      <li><a href="/pricing">Pricing</a></li>
      <li><a href="/blog/">Blog</a></li>
      <li>
        <a href="/blog/hsk3-study-plan">
          Latest Post: HSK 3 Study Plan
          <span class="link-sub">A structured approach to reaching HSK 3</span>
        </a>
      </li>
      <li><a href="/faq">FAQ</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/affiliates">Partner Program</a></li>
    </ul>

    <p class="tagline">Adaptive Mandarin study. Honest data, no theatrics.</p>
  </div>

</body>
</html>
