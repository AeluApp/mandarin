<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no">
  <title>{{SUBJECT}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:AllowPNG/>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style type="text/css">
    /* Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    body { margin: 0 !important; padding: 0 !important; width: 100% !important; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    a[x-apple-data-detectors] { color: inherit !important; text-decoration: none !important; font-size: inherit !important; font-family: inherit !important; font-weight: inherit !important; line-height: inherit !important; }
    /* Gmail fix */
    u + #body a { color: inherit; text-decoration: none; font-size: inherit; font-family: inherit; font-weight: inherit; line-height: inherit; }
    /* Outlook DPI fix */
    #outlook a { padding: 0; }
  </style>
</head>
<body id="body" style="margin: 0; padding: 0; word-spacing: normal; background-color: #F2EBE0;">
  <!-- Preheader (hidden) -->
  <div style="display: none; max-height: 0; overflow: hidden; mso-hide: all;" aria-hidden="true">
    {{PREHEADER}}
    &#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;&#847;&zwnj;&nbsp;
  </div>

  <!-- Outer wrapper -->
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color: #F2EBE0;">
    <tr>
      <td align="center" valign="top" style="padding: 24px 0;">

        <!--[if mso]>
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" align="center">
        <tr>
        <td>
        <![endif]-->

        <!-- Email container -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px; margin: 0 auto;">

          <!-- Header -->
          <tr>
            <td style="padding: 32px 24px 24px 24px; text-align: left;">
              <span style="font-family: Georgia, 'Times New Roman', serif; font-size: 24px; font-weight: normal; color: #2A3650; letter-spacing: 0.5px;">Aelu</span>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding: 0 24px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td style="border-top: 1px solid #D8D0C4; font-size: 1px; line-height: 1px;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Header illustration -->
          <tr>
            <td style="padding: 16px 24px 8px 24px;">
              <img src="{{EMAIL_HEADER_URL}}" alt="" width="552" height="110" style="display: block; width: 100%; max-width: 552px; height: auto; border: 0; border-radius: 4px;">
            </td>
          </tr>

          <!-- Content area -->
          <tr>
            <td style="padding: 24px 24px 32px 24px; font-family: Georgia, 'Times New Roman', serif; font-size: 16px; line-height: 1.6; color: #2A3650;">
              {{CONTENT}}
            </td>
          </tr>

          <!-- CTA button (omit this block if no CTA needed) -->
          <!--{{CTA_START}}-->
          <tr>
            <td style="padding: 0 24px 32px 24px;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td style="background-color: #946070; text-align: center;">
                    <!--[if mso]>
                    <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{CTA_URL}}" style="height:48px;v-text-anchor:middle;width:220px;" fill="true" stroke="false">
                    <v:fill type="tile" color="#946070"/>
                    <w:anchorlock/>
                    <center style="color:#F2EBE0;font-family:Georgia,serif;font-size:16px;font-weight:bold;">{{CTA_TEXT}}</center>
                    </v:roundrect>
                    <![endif]-->
                    <!--[if !mso]><!-->
                    <a href="{{CTA_URL}}" target="_blank" style="display: inline-block; background-color: #946070; color: #F2EBE0; font-family: Georgia, 'Times New Roman', serif; font-size: 16px; font-weight: bold; text-decoration: none; padding: 14px 32px; border-radius: 6px; min-width: 200px; text-align: center;">{{CTA_TEXT}}</a>
                    <!--<![endif]-->
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!--{{CTA_END}}-->

          <!-- Signature -->
          <tr>
            <td style="padding: 0 24px 32px 24px; font-family: Georgia, 'Times New Roman', serif; font-size: 16px; color: #2A3650;">
              &mdash; Aelu
            </td>
          </tr>

          <!-- Footer divider -->
          <tr>
            <td style="padding: 0 24px;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td style="border-top: 1px solid #D8D0C4; font-size: 1px; line-height: 1px;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 24px 24px 32px 24px; text-align: center;">
              <p style="margin: 0 0 8px 0; font-family: Georgia, 'Times New Roman', serif; font-size: 14px; color: #8890A0;">Aelu</p>
              <p style="margin: 0 0 8px 0; font-family: Georgia, 'Times New Roman', serif; font-size: 13px; color: #8890A0;">
                <a href="https://aeluapp.com" style="color: #8890A0; text-decoration: underline;">aeluapp.com</a>
              </p>
              <p style="margin: 0 0 16px 0; font-family: Georgia, 'Times New Roman', serif; font-size: 13px; color: #8890A0;">
                <a href="{{UNSUBSCRIBE_URL}}" style="color: #8890A0; text-decoration: underline;">Unsubscribe</a>
              </p>
              <p style="margin: 0; font-family: Georgia, 'Times New Roman', serif; font-size: 11px; color: #8890A0;">
                {{MAILING_ADDRESS}}
              </p>
            </td>
          </tr>

        </table>
        <!-- /Email container -->

        <!--[if mso]>
        </td>
        </tr>
        </table>
        <![endif]-->

      </td>
    </tr>
  </table>

</body>
</html>

<!--
=== PLAIN TEXT VERSION ===

---

Unsubscribe: {{UNSUBSCRIBE_URL}}

-->
