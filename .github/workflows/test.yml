name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run tests with coverage (parallel, CI Hypothesis profile)
        # Note: tests/conftest.py sets OMP_NUM_THREADS=1 via setdefault() as a
        # Python 3.14 local-dev safeguard (PyTorch + LightGBM libomp conflict).
        # This job runs Python 3.12 where the conflict does not occur; the env
        # var has no material effect here but is benign if inherited.
        env:
          HYPOTHESIS_PROFILE: ci
        run: >
          pytest tests/ -n auto
          -q --tb=short
          --cov=mandarin --cov-report=term-missing --cov-report=json
          --cov-fail-under=53

      - name: Verify risk-weighted coverage floors
        run: python scripts/coverage_floors.py

      - name: Security scan (bandit — HIGH severity is blocking)
        run: python scripts/run_security_scan.py

      - name: Run tone audio tests (allowed to fail on Python 3.14+)
        continue-on-error: true
        run: pytest tests/ -m tone_audio -v --tb=short

  test-t2-nightly:
    runs-on: ubuntu-latest
    # T2 tests: gap analysis, constants regression, coverage audit
    # Run on main push only (not PRs) — these are informational, not blocking
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run T2 tests (full Hypothesis examples)
        env:
          HYPOTHESIS_PROFILE: default
        run: pytest tests/ -m "t2 or slow" -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check mandarin/ --config pyproject.toml

  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run quality regression tests
        run: pytest tests/test_quality_fixes.py -v --tb=short

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run deterministic audit (13 checks)
        run: python scripts/audit_check.py

  doc-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check doc drift (shell)
        run: |
          # Table count
          ACTUAL_TABLES=$(grep -c "CREATE TABLE" schema.sql)
          DOC_TABLES=$(grep -oP '\d+ tables' BUILD_STATE.md | head -1 | grep -oP '\d+')
          if [ "$ACTUAL_TABLES" != "$DOC_TABLES" ]; then
            echo "FAIL: BUILD_STATE.md says $DOC_TABLES tables but schema.sql has $ACTUAL_TABLES"
            exit 1
          fi
          # Test file count
          ACTUAL_TESTS=$(ls tests/test_*.py | wc -l | tr -d ' ')
          DOC_SUITES=$(grep -oP '\d+ suites' BUILD_STATE.md | head -1 | grep -oP '\d+')
          if [ "$ACTUAL_TESTS" != "$DOC_SUITES" ]; then
            echo "FAIL: BUILD_STATE.md says $DOC_SUITES suites but found $ACTUAL_TESTS test files"
            exit 1
          fi
          echo "OK: $ACTUAL_TABLES tables, $ACTUAL_TESTS test files — docs match"
      - name: Check doc drift (schema version + tables)
        run: python scripts/check_doc_drift.py

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Start dev server
        run: python -m mandarin.web &
        env:
          FLASK_ENV: testing
          PORT: "5000"

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/health/live > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start within 30s"
          exit 1

      - name: Run Lighthouse CI
        continue-on-error: true
        run: lhci autorun

  visual-regression:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install playwright Pillow
          playwright install chromium

      - name: Start dev server
        run: python -m mandarin.web &

      - name: Wait for server
        run: sleep 5

      - name: Run visual regression
        continue-on-error: true
        run: python scripts/visual_regression.py --url http://localhost:5000

      - name: Upload diff images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: tests/visual-diffs/

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pa11y
        run: npm install -g pa11y

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Start dev server
        run: python -m mandarin.web &

      - name: Wait for server
        run: sleep 5

      - name: Run pa11y accessibility audit
        continue-on-error: true
        run: pa11y http://localhost:5000/ --standard WCAG2AA

  # ── Automated deployment to Fly.io ──────────────────────────────
  deploy:
    needs: [test, lint, quality-gates, audit]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not set — skipping deployment"
            exit 0
          fi
          flyctl deploy --strategy rolling --wait-timeout 120

      - name: Post-deploy health check
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        if: env.FLY_API_TOKEN != ''
        run: |
          APP_URL=$(flyctl status --json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('Hostname',''))" 2>/dev/null || echo "")
          if [ -n "$APP_URL" ]; then
            echo "Checking health at https://$APP_URL/api/health/live"
            for i in 1 2 3 4 5; do
              if curl -sf "https://$APP_URL/api/health/live" > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
              echo "Attempt $i failed, waiting 10s..."
              sleep 10
            done
            echo "Health check failed after 5 attempts"
            exit 1
          fi
