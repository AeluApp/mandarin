name: Auto-Fix CI Failures

on:
  workflow_run:
    workflows: ["Tests", "E2E Tests", "Deploy"]
    types: [completed]
    branches: [main]

jobs:
  auto-fix:
    # Only run on failures, only on main branch
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history for branch creation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Configure git for PR creation
        run: |
          git config user.name "aelu-ci-bot"
          git config user.email "ci-bot@aeluapp.com"

      - name: Run auto-fix agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: python scripts/auto_fix_ci.py
