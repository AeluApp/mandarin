name: CI Feedback Loop

on:
  workflow_run:
    workflows: ["Tests", "E2E Tests", "Security", "Deploy"]
    types: [completed]

jobs:
  ingest-failures:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # No pip install — ci_failure_ingest.py uses only stdlib + gh CLI.
      # The optional mandarin import has a fallback for when the package
      # isn't installed.

      - name: Extract failure details and create findings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: python scripts/ci_failure_ingest.py

      - name: Upload CI findings artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-findings-${{ github.event.workflow_run.id }}
          path: ci_findings.json
          retention-days: 30
          if-no-files-found: ignore
