name: Security

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install cyclonedx-bom
      - name: Generate SBOM
        run: bash scripts/gen_sbom.sh sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit (report generation)
        run: bandit -r mandarin/ -c pyproject.toml --format json --output bandit-report.json --exit-zero

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
        if: always()

      - name: Fail on high-severity findings
        run: |
          python -c "
          import json, sys, os
          report = 'bandit-report.json'
          if not os.path.exists(report) or os.path.getsize(report) == 0:
              print('FAIL: Bandit report missing or empty — scan may have crashed')
              sys.exit(1)
          with open(report) as f:
              data = json.load(f)
          high = [r for r in data.get('results', []) if r.get('issue_severity') in ('HIGH', 'CRITICAL')]
          if high:
              for r in high:
                  print(f\"HIGH: {r['filename']}:{r['line_number']} - {r['issue_text']}\")
              sys.exit(1)
          print('No HIGH/CRITICAL severity findings.')
          "

  secrets:
    name: Secrets Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies + pip-audit
        run: |
          pip install -r requirements.txt
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --strict --desc on 2>&1 | tee pip-audit-report.txt

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.txt
        if: always()

      - name: Fail on critical vulnerabilities
        if: always()
        run: |
          if [ ! -s pip-audit-report.txt ]; then
            echo "FAIL: pip-audit report missing or empty — audit may have failed"
            exit 1
          fi
          if grep -qi "CRITICAL\|HIGH" pip-audit-report.txt; then
            echo "FAIL: Critical or high-severity dependency vulnerabilities found"
            cat pip-audit-report.txt
            exit 1
          fi
          echo "No critical dependency vulnerabilities found."
