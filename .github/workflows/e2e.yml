name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"
          pip install pytest pytest-playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tb=short --browser chromium
        env:
          SECRET_KEY: "ci-e2e-test-secret-key"
          IS_PRODUCTION: "0"

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/
        if: failure()
