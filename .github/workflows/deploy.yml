name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run full test suite (fail-fast on first error)
        run: >
          pytest -x -v --tb=short -m "not slow"
        env:
          HYPOTHESIS_PROFILE: ci

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Deploy to Fly.io
        run: flyctl deploy --local-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Wait for deploy health check
        run: |
          echo "Polling health endpoint..."
          for i in $(seq 1 24); do
            if curl -sf https://aelu-app.fly.dev/api/health/ready > /dev/null 2>&1; then
              echo "Health check passed after $((i * 5)) seconds"
              exit 0
            fi
            echo "Attempt $i: not ready yet, waiting 5s..."
            sleep 5
          done
          echo "FAIL: Health check did not pass within 120 seconds"
          exit 1

      - name: Post-deploy smoke test
        run: ./scripts/smoke_test.sh
        env:
          BASE_URL: https://aelu-app.fly.dev
