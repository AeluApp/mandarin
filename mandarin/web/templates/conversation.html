<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversation Practice — Aelu</title>
  <script nonce="{{ csp_nonce }}">(function(){var savedTheme=null;try{savedTheme=localStorage.getItem("aelu-theme")}catch(e){}var d;if(savedTheme){d=savedTheme==="dark"}else{var h=new Date().getHours();d=h>=19||h<7}document.documentElement.setAttribute("data-theme",d?"dark":"light");document.documentElement.style.backgroundColor=d?"#1C2028":"#F2EBE0";})()</script>
  <link rel="icon" href="/static/favicon.ico?v=2" type="image/x-icon">
  <link rel="stylesheet" href="/static/style.css?v={{ static_hash('style.css') }}">
  <style nonce="{{ csp_nonce }}">
    .conv-page { max-width: 720px; margin: 0 auto; padding: var(--space-6); }

    .conv-header { margin-bottom: var(--space-5); }
    .conv-breadcrumb { font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-dim); margin-bottom: var(--space-2); }
    .conv-breadcrumb a { color: var(--color-text-faint); text-decoration: none; }
    .conv-breadcrumb a:hover { color: var(--color-accent); }
    .conv-breadcrumb .sep { margin: 0 var(--space-1); color: var(--color-divider); }
    .conv-header h1 { font-family: var(--font-heading); font-size: var(--text-3xl); color: var(--color-text); letter-spacing: var(--tracking-tight); }
    .conv-header p { font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-dim); margin-top: var(--space-1); }

    /* Level picker */
    .conv-level-bar { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap; }
    .conv-level-bar label { font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-dim); }
    .conv-level-select { font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text); background: var(--color-surface-alt); border: 1px solid var(--color-divider); border-radius: 4px; padding: 4px 10px; cursor: pointer; }
    .conv-level-select:focus { outline: 2px solid var(--color-accent); outline-offset: 1px; }

    /* Scenario grid */
    .scenario-grid { display: grid; gap: var(--space-3); }
    .scenario-card { text-align: left; padding: var(--space-4); background: var(--color-surface-alt); border: none; border-radius: 8px; cursor: pointer; font-family: var(--font-body); width: 100%; transition: transform 0.15s var(--ease-upward), box-shadow 0.15s var(--ease-upward); }
    .scenario-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md, 0 4px 16px rgba(0,0,0,0.12)); }
    .scenario-title { font-size: var(--text-base); font-weight: 600; color: var(--color-text); margin-bottom: var(--space-1); }
    .scenario-situation { font-size: var(--text-sm); color: var(--color-text-dim); line-height: 1.5; }
    .scenario-badge { display: inline-block; margin-top: var(--space-2); padding: 2px 8px; border-radius: 4px; font-size: var(--text-xs); font-weight: 600; background: color-mix(in srgb, var(--color-accent) 15%, var(--color-surface)); color: var(--color-accent); }

    /* Active conversation */
    .conv-active { display: none; }
    .conv-active.show { display: block; }

    .conv-back-btn { display: inline-flex; align-items: center; gap: var(--space-1); font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-accent); background: none; border: none; cursor: pointer; padding: 0; margin-bottom: var(--space-4); }
    .conv-back-btn:hover { opacity: 0.75; }

    .conv-difficulty { display: inline-block; margin-bottom: var(--space-3); padding: 3px 10px; border-radius: 4px; font-size: var(--text-xs); font-weight: 600; background: color-mix(in srgb, var(--color-accent) 15%, var(--color-surface)); color: var(--color-accent); }

    .conv-situation { font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-dim); margin-bottom: var(--space-4); padding: var(--space-3); background: var(--color-surface-alt); border-radius: 8px; line-height: 1.6; }
    .conv-situation strong { color: var(--color-text); }

    .conv-messages { min-height: 120px; max-height: 420px; overflow-y: auto; margin-bottom: var(--space-3); display: flex; flex-direction: column; gap: var(--space-3); }
    .conv-msg { font-family: var(--font-body); font-size: var(--text-sm); line-height: 1.7; padding: var(--space-3) var(--space-4); border-radius: 8px; }
    .conv-msg.tutor { background: var(--color-surface-alt); color: var(--color-text); }
    .conv-msg.user { background: color-mix(in srgb, var(--color-accent) 12%, var(--color-surface)); color: var(--color-text); align-self: flex-end; max-width: 85%; }
    .conv-msg.feedback { background: color-mix(in srgb, var(--color-secondary) 10%, var(--color-surface)); color: var(--color-secondary); font-style: italic; }
    .conv-msg.hint-msg { background: color-mix(in srgb, var(--color-text-dim) 8%, var(--color-surface)); color: var(--color-text-dim); font-style: italic; font-size: var(--text-xs); }
    .conv-hanzi { font-family: var(--font-hanzi, 'Noto Serif SC', serif); font-size: var(--text-lg); }
    .conv-pinyin { font-size: var(--text-sm); color: var(--color-text-dim); margin-top: 2px; }
    .conv-english { font-size: var(--text-xs); color: var(--color-text-faint); margin-top: 2px; }

    .conv-scaffold-bar { display: flex; gap: var(--space-2); margin-bottom: var(--space-3); }
    .btn-scaffold { font-family: var(--font-body); font-size: var(--text-xs); color: var(--color-text-dim); background: var(--color-surface-alt); border: 1px solid var(--color-divider); border-radius: 4px; padding: 4px 12px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
    .btn-scaffold:hover { color: var(--color-accent); border-color: var(--color-accent); }

    .conv-input-row { display: flex; gap: var(--space-2); align-items: flex-end; }
    .conv-textarea { flex: 1; font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text); background: var(--color-surface-alt); border: 1px solid var(--color-divider); border-radius: 8px; padding: var(--space-3); resize: none; min-height: 56px; line-height: 1.5; }
    .conv-textarea:focus { outline: 2px solid var(--color-accent); outline-offset: 1px; border-color: transparent; }
    .conv-textarea::placeholder { color: var(--color-text-faint); }
    .btn-send { padding: var(--space-3) var(--space-4); background: var(--color-accent); color: #fff; border: none; border-radius: 8px; font-family: var(--font-body); font-size: var(--text-sm); cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
    .btn-send:hover { opacity: 0.85; }
    .btn-send:disabled { opacity: 0.45; cursor: not-allowed; }

    .conv-loading { text-align: center; padding: var(--space-8); color: var(--color-text-dim); font-family: var(--font-body); font-size: var(--text-sm); }
    .conv-empty { text-align: center; padding: var(--space-8); color: var(--color-text-dim); font-family: var(--font-body); font-size: var(--text-sm); }

    @media (max-width: 520px) {
      .conv-page { padding: var(--space-4); }
      .conv-messages { max-height: 300px; }
    }
  </style>
</head>
<body>
<div class="conv-page">
  <div class="conv-header">
    <div class="conv-breadcrumb">
      <a href="/">Home</a>
      <span class="sep">›</span>
      Conversation Practice
    </div>
    <h1>Conversation Practice</h1>
    <p>Choose a scenario and practice speaking Mandarin with a patient tutor.</p>
  </div>

  <!-- Scenario picker -->
  <div id="conv-picker">
    <div class="conv-level-bar">
      <label for="conv-level">Level</label>
      <select id="conv-level" class="conv-level-select">
        <option value="">All</option>
        <option value="1">HSK 1</option>
        <option value="2" selected>HSK 2</option>
        <option value="3">HSK 3</option>
        <option value="4">HSK 4</option>
        <option value="5">HSK 5</option>
        <option value="6">HSK 6</option>
      </select>
    </div>
    <div id="conv-scenario-list"><div class="conv-loading">Loading scenarios…</div></div>
  </div>

  <!-- Active conversation -->
  <div id="conv-active" class="conv-active">
    <button class="conv-back-btn" id="conv-back">← Back to scenarios</button>
    <div id="conv-difficulty" class="conv-difficulty" style="display:none;"></div>
    <div id="conv-situation" class="conv-situation"></div>
    <div id="conv-messages" class="conv-messages"></div>
    <div class="conv-scaffold-bar">
      <button class="btn-scaffold" id="conv-hint">Hint</button>
      <button class="btn-scaffold" id="conv-simplify">Simplify</button>
    </div>
    <div class="conv-input-row">
      <textarea id="conv-input" class="conv-textarea" rows="2" placeholder="Type your response in Chinese…"></textarea>
      <button id="conv-send" class="btn-send">Send</button>
    </div>
  </div>
</div>

<script nonce="{{ csp_nonce }}">
  var _active = null;

  function apiFetch(url, opts) {
    opts = opts || {};
    opts.credentials = "include";
    opts.headers = Object.assign({"X-Requested-With": "XMLHttpRequest"}, opts.headers || {});
    return fetch(url, opts);
  }

  function esc(s) {
    return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function loadScenarios() {
    var level = document.getElementById("conv-level").value;
    var url = "/api/conversation/scenarios" + (level ? "?hsk_level=" + level : "");
    var listEl = document.getElementById("conv-scenario-list");
    listEl.innerHTML = '<div class="conv-loading">Loading…</div>';
    apiFetch(url).then(function(r) { return r.json(); }).then(function(data) {
      var scenarios = data.scenarios || [];
      if (scenarios.length === 0) {
        listEl.innerHTML = '<div class="conv-empty">No scenarios available for this level.</div>';
        return;
      }
      var html = '<div class="scenario-grid">';
      scenarios.forEach(function(s) {
        html += '<button class="scenario-card" onclick="startConversation(' + JSON.stringify(s.id) + ')">';
        html += '<div class="scenario-title">' + esc(s.title || s.situation || s.id) + '</div>';
        if (s.situation && s.title) {
          html += '<div class="scenario-situation">' + esc(s.situation) + '</div>';
        }
        html += '<span class="scenario-badge">HSK ' + esc(String(s.hsk_level || "?")) + ' dialogue</span>';
        html += '</button>';
      });
      html += '</div>';
      listEl.innerHTML = html;
    }).catch(function() {
      listEl.innerHTML = '<div class="conv-empty">Could not load scenarios. Please refresh the page.</div>';
    });
  }

  function startConversation(scenarioId) {
    var sendBtn = document.getElementById("conv-send");
    if (sendBtn) sendBtn.disabled = true;
    apiFetch("/api/conversation/start", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({scenario_id: scenarioId})
    }).then(function(r) { return r.json(); }).then(function(data) {
      _active = data;

      document.getElementById("conv-picker").style.display = "none";
      document.getElementById("conv-active").classList.add("show");

      // Difficulty badge
      var badge = document.getElementById("conv-difficulty");
      var hskLevel = data.hsk_level || "";
      if (hskLevel) {
        badge.textContent = "HSK " + hskLevel + " dialogue";
        badge.style.display = "";
      } else {
        badge.style.display = "none";
      }

      // Situation
      var situation = data.situation || "";
      document.getElementById("conv-situation").innerHTML =
        '<strong>Situation:</strong> ' + esc(situation);

      // Opening tutor prompt
      var msgsEl = document.getElementById("conv-messages");
      msgsEl.innerHTML = "";
      appendTutorMsg(msgsEl, data.prompt_zh, data.prompt_pinyin, data.prompt_en);

      var input = document.getElementById("conv-input");
      if (input) { input.value = ""; input.focus(); }
      if (sendBtn) sendBtn.disabled = false;
    }).catch(function() {
      if (sendBtn) sendBtn.disabled = false;
    });
  }

  function appendTutorMsg(msgsEl, zh, pinyin, en) {
    var html = '<div class="conv-msg tutor">';
    if (zh) html += '<div class="conv-hanzi">' + esc(zh) + '</div>';
    if (pinyin) html += '<div class="conv-pinyin">' + esc(pinyin) + '</div>';
    if (en) html += '<div class="conv-english">' + esc(en) + '</div>';
    html += '</div>';
    msgsEl.innerHTML += html;
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }

  function sendResponse() {
    var input = document.getElementById("conv-input");
    var sendBtn = document.getElementById("conv-send");
    var text = input.value.trim();
    if (!text || !_active) return;

    input.value = "";
    sendBtn.disabled = true;

    var msgsEl = document.getElementById("conv-messages");
    msgsEl.innerHTML += '<div class="conv-msg user"><div class="conv-hanzi">' + esc(text) + '</div></div>';
    msgsEl.scrollTop = msgsEl.scrollHeight;

    apiFetch("/api/conversation/respond", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        response: text,
        scenario_id: _active.scenario_id || "",
        hsk_level: _active.hsk_level || 2
      })
    }).then(function(r) { return r.json(); }).then(function(data) {
      if (data.follow_up_zh || data.follow_up_pinyin) {
        appendTutorMsg(msgsEl, data.follow_up_zh, data.follow_up_pinyin, data.follow_up_en || "");
      }
      if (data.feedback) {
        msgsEl.innerHTML += '<div class="conv-msg feedback">' + esc(data.feedback) + '</div>';
        msgsEl.scrollTop = msgsEl.scrollHeight;
      }
      sendBtn.disabled = false;
      input.focus();
    }).catch(function() {
      msgsEl.innerHTML += '<div class="conv-msg tutor" style="color:var(--color-text-dim);">Could not evaluate response.</div>';
      msgsEl.scrollTop = msgsEl.scrollHeight;
      sendBtn.disabled = false;
    });
  }

  function requestHint() {
    if (!_active) return;
    var msgsEl = document.getElementById("conv-messages");
    apiFetch("/api/conversation/hint", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({scenario_id: _active.scenario_id || ""})
    }).then(function(r) { return r.json(); }).then(function(data) {
      var hint = data.hint || "Try a simple subject + verb + object structure.";
      msgsEl.innerHTML += '<div class="conv-msg hint-msg">Hint: ' + esc(hint) + '</div>';
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }).catch(function() {
      msgsEl.innerHTML += '<div class="conv-msg hint-msg">Hint: Start with the subject, then the verb, then the object.</div>';
      msgsEl.scrollTop = msgsEl.scrollHeight;
    });
  }

  function requestSimplify() {
    if (!_active) return;
    var msgsEl = document.getElementById("conv-messages");
    var lastTutor = msgsEl.querySelector(".conv-msg.tutor:last-of-type .conv-hanzi");
    var text = lastTutor ? lastTutor.textContent : "";
    apiFetch("/api/conversation/simplify", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({scenario_id: _active.scenario_id || "", text: text})
    }).then(function(r) { return r.json(); }).then(function(data) {
      var simplified = data.simplified || text;
      var pinyin = data.pinyin || "";
      var html = '<div class="conv-msg hint-msg">Simplified: <span style="font-family:var(--font-hanzi,serif);">' + esc(simplified) + '</span>';
      if (pinyin) html += '<br>' + esc(pinyin);
      html += '</div>';
      msgsEl.innerHTML += html;
      msgsEl.scrollTop = msgsEl.scrollHeight;
    }).catch(function() {});
  }

  function backToScenarios() {
    _active = null;
    document.getElementById("conv-active").classList.remove("show");
    document.getElementById("conv-picker").style.display = "";
    document.getElementById("conv-messages").innerHTML = "";
  }

  // ── Wire up events ──
  document.addEventListener("DOMContentLoaded", function() {
    loadScenarios();

    var levelEl = document.getElementById("conv-level");
    if (levelEl) levelEl.addEventListener("change", loadScenarios);

    var sendBtn = document.getElementById("conv-send");
    if (sendBtn) sendBtn.onclick = sendResponse;

    var hintBtn = document.getElementById("conv-hint");
    if (hintBtn) hintBtn.onclick = requestHint;

    var simplifyBtn = document.getElementById("conv-simplify");
    if (simplifyBtn) simplifyBtn.onclick = requestSimplify;

    var backBtn = document.getElementById("conv-back");
    if (backBtn) backBtn.onclick = backToScenarios;

    // Send on Cmd/Ctrl+Enter
    var textarea = document.getElementById("conv-input");
    if (textarea) {
      textarea.addEventListener("keydown", function(e) {
        if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
          e.preventDefault();
          sendResponse();
        }
      });
    }

    // Reduced-motion: no-op (no animated sections on this page)
  });
</script>
</body>
</html>
