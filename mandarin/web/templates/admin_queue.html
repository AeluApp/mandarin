<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Queue — Aelu Admin</title>
  <script nonce="{{ csp_nonce }}">(function(){var h=new Date().getHours(),d=h>=19||h<7;document.documentElement.setAttribute("data-theme",d?"dark":"light");document.documentElement.style.backgroundColor=d?"#1C2028":"#F2EBE0";})()</script>
  <link rel="icon" href="/static/favicon.ico?v=2" type="image/x-icon">
  <link rel="stylesheet" href="/static/style.css?v={{ static_hash('style.css') }}">
  <style nonce="{{ csp_nonce }}">
    .admin-page { max-width: 960px; margin: 0 auto; padding: var(--space-6); }
    .admin-header { margin-bottom: var(--space-5); }
    .admin-header h1 { font-family: var(--font-heading); font-size: var(--text-3xl); color: var(--color-text); letter-spacing: var(--tracking-tight); }
    .admin-breadcrumb { font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-dim); margin-bottom: var(--space-2); }
    .admin-breadcrumb a { color: var(--color-text-faint); text-decoration: none; }
    .admin-breadcrumb a:hover { color: var(--color-accent); }
    .admin-breadcrumb .sep { margin: 0 var(--space-1); color: var(--color-divider); }

    .admin-section { margin-bottom: var(--space-6); opacity: 0; transform: translateY(12px); transition: opacity 0.5s var(--ease-upward), transform 0.5s var(--ease-upward); }
    .admin-section.is-visible { opacity: 1; transform: translateY(0); }
    .admin-section h2 { font-family: var(--font-heading); font-size: var(--text-lg); color: var(--color-text); margin-bottom: var(--space-3); }

    .queue-controls { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-4); flex-wrap: wrap; }
    .queue-count { font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-dim); }
    .toggle-all { font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-accent); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }

    .admin-table { width: 100%; border-collapse: collapse; font-family: var(--font-body); font-size: var(--text-sm); }
    .admin-table th, .admin-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--color-divider); vertical-align: top; }
    .admin-table th { color: var(--color-text-dim); text-transform: uppercase; letter-spacing: var(--tracking-wide); font-size: var(--text-xs); }
    .admin-table td { color: var(--color-text); }
    .admin-table tr { transition: background-color 0.15s; }
    .admin-table tr:hover td { background: color-mix(in srgb, var(--color-accent) 3%, var(--color-surface)); }

    .content-preview { max-width: 380px; white-space: pre-wrap; word-break: break-word; color: var(--color-text); line-height: 1.5; }
    .content-preview.truncated { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .expand-btn { font-size: var(--text-xs); color: var(--color-accent); background: none; border: none; cursor: pointer; padding: 0; margin-top: var(--space-1); display: block; }

    .platform-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .platform-twitter  { background: color-mix(in srgb, #1DA1F2 15%, var(--color-surface)); color: #1DA1F2; }
    .platform-linkedin { background: color-mix(in srgb, #0A66C2 15%, var(--color-surface)); color: #0A66C2; }
    .platform-email    { background: color-mix(in srgb, var(--color-accent) 15%, var(--color-surface)); color: var(--color-accent); }
    .platform-blog     { background: color-mix(in srgb, var(--color-secondary) 15%, var(--color-surface)); color: var(--color-secondary); }
    .platform-other    { background: color-mix(in srgb, var(--color-text-dim) 15%, var(--color-surface)); color: var(--color-text-dim); }

    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: var(--text-xs); font-weight: 600; }
    .status-pending  { background: color-mix(in srgb, #F0A500 15%, var(--color-surface)); color: #C88A00; }
    .status-approved { background: color-mix(in srgb, var(--color-correct) 20%, var(--color-surface)); color: var(--color-correct); }
    .status-rejected { background: color-mix(in srgb, var(--color-incorrect) 15%, var(--color-surface)); color: var(--color-incorrect); }
    .status-expired  { background: color-mix(in srgb, var(--color-text-dim) 15%, var(--color-surface)); color: var(--color-text-dim); }

    .action-btns { display: flex; gap: var(--space-2); align-items: center; white-space: nowrap; }
    .btn-approve { padding: 4px 14px; background: var(--color-correct); color: #fff; border: none; border-radius: 4px; font-family: var(--font-body); font-size: var(--text-sm); cursor: pointer; transition: opacity 0.15s; }
    .btn-approve:hover { opacity: 0.85; }
    .btn-reject  { padding: 4px 14px; background: none; color: var(--color-incorrect); border: 1px solid var(--color-incorrect); border-radius: 4px; font-family: var(--font-body); font-size: var(--text-sm); cursor: pointer; transition: opacity 0.15s; }
    .btn-reject:hover { opacity: 0.7; }
    .btn-approve:disabled, .btn-reject:disabled { opacity: 0.4; cursor: not-allowed; }

    .note-input { font-family: var(--font-body); font-size: var(--text-xs); color: var(--color-text); background: var(--color-surface-alt); border: 1px solid var(--color-divider); border-radius: 4px; padding: 3px 8px; width: 160px; }
    .note-input::placeholder { color: var(--color-text-faint); }

    .empty-state { text-align: center; padding: var(--space-8); color: var(--color-text-dim); font-family: var(--font-body); }
    .empty-state p { margin-top: var(--space-2); font-size: var(--text-sm); }

    .queue-loading { text-align: center; padding: var(--space-6); color: var(--color-text-dim); font-family: var(--font-body); font-size: var(--text-sm); }

    .toast { position: fixed; bottom: var(--space-5); right: var(--space-5); background: var(--color-text); color: var(--color-base); font-family: var(--font-body); font-size: var(--text-sm); padding: var(--space-3) var(--space-4); border-radius: 6px; z-index: 999; opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 680px) {
      .admin-table td:nth-child(4), .admin-table th:nth-child(4) { display: none; }
      .note-input { width: 100px; }
    }
  </style>
</head>
<body>
<div class="admin-page">
  <div class="admin-header">
    <div class="admin-breadcrumb">
      <a href="/admin/">Admin</a>
      <span class="sep">›</span>
      Marketing Queue
    </div>
    <h1>Marketing Queue</h1>
  </div>

  <div class="admin-section" id="queue-section">
    <div class="queue-controls">
      <span class="queue-count" id="queue-count">Loading…</span>
      <button class="toggle-all" id="toggle-all-btn" onclick="toggleShowAll()">Show approved &amp; rejected</button>
    </div>
    <div id="queue-container">
      <div class="queue-loading">Loading queue…</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script nonce="{{ csp_nonce }}">
  var showingAll = false;

  function adminFetch(url, opts) {
    opts = opts || {};
    opts.credentials = "same-origin";
    opts.headers = Object.assign({"X-Requested-With": "XMLHttpRequest"}, opts.headers || {});
    return fetch(url, opts).then(function(r) {
      if (!r.ok) throw new Error("HTTP " + r.status + " on " + url);
      return r.json();
    });
  }

  function esc(s) {
    return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function platformBadge(p) {
    var cls = "platform-other";
    if (p === "twitter" || p === "x") cls = "platform-twitter";
    else if (p === "linkedin") cls = "platform-linkedin";
    else if (p === "email") cls = "platform-email";
    else if (p === "blog") cls = "platform-blog";
    return '<span class="platform-badge ' + cls + '">' + esc(p || "—") + '</span>';
  }

  function statusBadge(s) {
    return '<span class="status-badge status-' + esc(s) + '">' + esc(s) + '</span>';
  }

  function fmtDate(s) {
    if (!s) return "—";
    try { return new Date(s.replace(" ", "T") + "Z").toLocaleString(undefined, {dateStyle:"short", timeStyle:"short"}); }
    catch(e) { return s; }
  }

  function loadQueue() {
    var url = showingAll ? "/api/admin/marketing/queue/all" : "/api/admin/marketing/queue";
    adminFetch(url).then(function(data) {
      var items = data.queue || [];
      var pendingCount = items.filter(function(i){ return i.status === "pending"; }).length;
      var countEl = document.getElementById("queue-count");
      if (showingAll) {
        countEl.textContent = items.length + " item" + (items.length !== 1 ? "s" : "") + " total";
      } else {
        countEl.textContent = pendingCount + " pending";
      }

      var container = document.getElementById("queue-container");
      if (items.length === 0) {
        container.innerHTML = '<div class="empty-state"><strong>Queue is empty</strong><p>No ' + (showingAll ? "" : "pending ") + 'items to review.</p></div>';
        return;
      }

      var rows = items.map(function(item) {
        var isPending = item.status === "pending";
        var actions = isPending
          ? '<div class="action-btns">'
            + '<input class="note-input" id="note-' + item.id + '" placeholder="Optional note">'
            + '<button class="btn-approve" onclick="act(' + item.id + ',\'approve\')">Approve</button>'
            + '<button class="btn-reject"  onclick="act(' + item.id + ',\'reject\')">Reject</button>'
            + '</div>'
          : (item.reviewer_note ? '<span style="color:var(--color-text-dim);font-size:var(--text-xs)">' + esc(item.reviewer_note) + '</span>' : '—');

        var preview = esc(item.content_text || "");
        var previewHtml = '<div class="content-preview truncated" id="preview-' + item.id + '">' + preview + '</div>'
          + '<button class="expand-btn" id="expand-' + item.id + '" onclick="expandPreview(' + item.id + ')">Show more</button>';

        return '<tr id="row-' + item.id + '">'
          + '<td>' + previewHtml + '</td>'
          + '<td>' + platformBadge(item.platform) + '</td>'
          + '<td>' + statusBadge(item.status) + '</td>'
          + '<td style="color:var(--color-text-dim)">' + fmtDate(item.submitted_at) + '</td>'
          + '<td>' + actions + '</td>'
          + '</tr>';
      }).join("");

      container.innerHTML = '<table class="admin-table"><thead><tr>'
        + '<th>Content</th><th>Platform</th><th>Status</th><th>Submitted</th><th>Actions</th>'
        + '</tr></thead><tbody>' + rows + '</tbody></table>';
    }).catch(function(e) {
      document.getElementById("queue-container").innerHTML =
        '<div class="empty-state">Failed to load queue: ' + esc(e.message) + '</div>';
    });
  }

  function expandPreview(id) {
    var el = document.getElementById("preview-" + id);
    var btn = document.getElementById("expand-" + id);
    if (!el) return;
    el.classList.remove("truncated");
    if (btn) btn.style.display = "none";
  }

  function act(id, action) {
    var row = document.getElementById("row-" + id);
    var noteEl = document.getElementById("note-" + id);
    var note = noteEl ? noteEl.value.trim() : "";
    if (row) {
      row.querySelectorAll("button").forEach(function(b) { b.disabled = true; });
    }
    adminFetch("/api/admin/marketing/queue/" + id + "/" + action, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({note: note})
    }).then(function() {
      showToast(action === "approve" ? "Approved" : "Rejected");
      if (row && !showingAll) {
        row.style.transition = "opacity 0.3s";
        row.style.opacity = "0";
        setTimeout(function() { loadQueue(); }, 350);
      } else {
        loadQueue();
      }
    }).catch(function(e) {
      showToast("Error: " + e.message);
      if (row) row.querySelectorAll("button").forEach(function(b) { b.disabled = false; });
    });
  }

  function toggleShowAll() {
    showingAll = !showingAll;
    var btn = document.getElementById("toggle-all-btn");
    btn.textContent = showingAll ? "Show pending only" : "Show approved & rejected";
    loadQueue();
  }

  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function() { t.classList.remove("show"); }, 2500);
  }

  // Scroll reveal
  (function() {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      document.querySelectorAll('.admin-section').forEach(function(s) { s.classList.add('is-visible'); });
      return;
    }
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('is-visible'); observer.unobserve(e.target); } });
    }, {threshold: 0.05});
    document.querySelectorAll('.admin-section').forEach(function(s) { observer.observe(s); });
  })();

  loadQueue();
</script>
</body>
</html>
