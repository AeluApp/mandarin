<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Aelu — Not Found</title>
  <script>(function(){var h=new Date().getHours(),d=h>=19||h<7;document.documentElement.setAttribute("data-theme",d?"dark":"light");document.documentElement.style.backgroundColor=d?"#1C2028":"#F2EBE0";})()</script>
  <link rel="icon" href="/static/favicon.ico?v=2" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Source+Serif+4:wght@400;600&family=Noto+Serif+SC:wght@400;700&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .not-found-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: var(--space-6);
      position: relative;
    }
    .not-found-hanzi {
      font-family: 'Noto Serif SC', 'Songti SC', serif;
      font-size: 4rem;
      color: var(--color-accent);
      opacity: 0;
      margin-bottom: var(--space-4);
      line-height: 1;
      animation: hanziMaterialize 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }
    @keyframes hanziMaterialize {
      0% { opacity: 0; transform: scale(0.7); filter: blur(8px); }
      60% { opacity: 0.7; filter: blur(0); }
      100% { opacity: 0.6; transform: scale(1); filter: blur(0); }
    }
    .not-found-title {
      font-family: var(--font-heading);
      font-size: var(--text-2xl);
      font-weight: 400;
      color: var(--color-text);
      letter-spacing: 0.03em;
      margin-bottom: var(--space-3);
      opacity: 0;
      animation: driftUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
    }
    .not-found-sub {
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--color-text-dim);
      margin-bottom: var(--space-6);
      max-width: 360px;
      opacity: 0;
      animation: driftUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1s forwards;
    }
    .not-found-link {
      display: inline-block;
      color: var(--color-on-accent, #fff);
      background: var(--color-accent);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      text-decoration: none;
      padding: 10px 28px;
      border-radius: 2px;
      transition: opacity 0.15s, transform 0.15s;
      opacity: 0;
      animation: driftUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
    }
    .not-found-link:hover { opacity: 0.85; }
    .not-found-link:active { transform: scale(0.97); }
    @keyframes driftUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Particle canvas for dissolve effect */
    .dissolve-canvas {
      position: fixed; inset: 0; z-index: 10; pointer-events: none;
    }
    .error-illustration {
      display: block;
      max-width: 280px;
      width: 60%;
      height: auto;
      margin: 0 auto var(--space-5);
      border-radius: 8px;
      opacity: 0;
      animation: gentleBloom 0.8s cubic-bezier(0.2, 0, 0.2, 1) 0.15s forwards;
      box-shadow: var(--shadow-md);
    }
    html[data-theme="dark"] .error-illustration { box-shadow: var(--shadow-lg); }
    @keyframes gentleBloom { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="webgl-atmosphere" data-scene="login" aria-hidden="true"></div>
  <div id="app" role="main">
    <div class="not-found-wrap">
      <img src="/static/illustrations/error-page.webp" alt="" class="error-illustration" aria-hidden="true">
      <div class="not-found-hanzi">迷</div>
      <h1 class="not-found-title">Page not found</h1>
      <p class="not-found-sub">This page doesn't exist or may have moved.</p>
      <a href="/" class="not-found-link">Back to dashboard</a>
    </div>
  </div>
  <script>
    (function() {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.querySelectorAll('.error-illustration').forEach(function(img) {
          img.src = img.src.replace(/\.webp$/, '-dark.webp');
        });
      }
    })();

    // Character dissolve: 迷 dissolves into particles drifting toward the home link
    (function() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      var hanzi = document.querySelector('.not-found-hanzi');
      var link = document.querySelector('.not-found-link');
      if (!hanzi || !link) return;

      // After entrance animation completes + hold, dissolve
      setTimeout(function() {
        var rect = hanzi.getBoundingClientRect();
        var linkRect = link.getBoundingClientRect();
        var cx = rect.left + rect.width / 2;
        var cy = rect.top + rect.height / 2;
        var tx = linkRect.left + linkRect.width / 2;
        var ty = linkRect.top + linkRect.height / 2;

        var canvas = document.createElement('canvas');
        canvas.className = 'dissolve-canvas';
        canvas.setAttribute('aria-hidden', 'true');
        document.body.appendChild(canvas);

        var ctx = canvas.getContext('2d');
        var dpr = Math.min(window.devicePixelRatio || 1, 2);
        var w = window.innerWidth;
        var h = window.innerHeight;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        var accent = isDark ? { r: 176, g: 120, b: 136 } : { r: 148, g: 96, b: 112 };

        var count = 18;
        var particles = [];
        for (var i = 0; i < count; i++) {
          var angle = (Math.PI * 2 * i) / count;
          var spread = 15 + Math.random() * 25;
          particles.push({
            x: cx + Math.cos(angle) * spread * Math.random(),
            y: cy + Math.sin(angle) * spread * Math.random(),
            size: 2 + Math.random() * 3,
            delay: Math.random() * 300
          });
        }

        // Fade out the character
        hanzi.style.transition = 'opacity 0.6s ease, filter 0.6s ease';
        hanzi.style.opacity = '0';
        hanzi.style.filter = 'blur(4px)';

        var startTime = performance.now();
        var duration = 1200;

        function animate(now) {
          var elapsed = now - startTime;
          if (elapsed > duration) {
            canvas.parentNode.removeChild(canvas);
            // Pulse the link
            link.style.transition = 'box-shadow 0.4s ease';
            link.style.boxShadow = '0 0 0 4px color-mix(in srgb, var(--color-accent) 20%, transparent)';
            setTimeout(function() { link.style.boxShadow = ''; }, 800);
            return;
          }

          ctx.clearRect(0, 0, w, h);

          for (var j = 0; j < particles.length; j++) {
            var p = particles[j];
            var t = Math.max(0, elapsed - p.delay) / (duration - p.delay);
            if (t <= 0 || t > 1) continue;

            var ease = 1 - Math.pow(1 - t, 2);
            var px = p.x + (tx - p.x) * ease;
            var py = p.y + (ty - p.y) * ease;
            var alpha = (1 - t) * 0.6;
            var size = p.size * (1 - t * 0.5);

            ctx.beginPath();
            ctx.arc(px, py, size, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + accent.r + ',' + accent.g + ',' + accent.b + ',' + alpha + ')';
            ctx.fill();
          }

          requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
      }, 3000); // Hold for 3 seconds after page load, then dissolve
    })();
  </script>
  <script src="/static/webgl/three.min.js" async></script>
  <script src="/static/webgl/scene-manager.js" defer></script>
</body>
</html>
