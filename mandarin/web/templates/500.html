<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Aelu — Error</title>
  <script>(function(){var h=new Date().getHours(),d=h>=19||h<7;document.documentElement.setAttribute("data-theme",d?"dark":"light");document.documentElement.style.backgroundColor=d?"#1C2028":"#F2EBE0";})()</script>
  <link rel="icon" href="/static/favicon.ico?v=2" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Source+Serif+4:wght@400;600&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .error-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: var(--space-6);
      position: relative;
    }
    .error-title {
      font-family: var(--font-heading);
      font-size: var(--text-xl);
      font-weight: 400;
      color: var(--color-text-dim);
      letter-spacing: 0.05em;
      margin-bottom: var(--space-4);
    }
    .error-sub {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      color: var(--color-text-dim);
      margin-bottom: var(--space-4);
    }
    .error-link {
      color: var(--color-accent);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      text-decoration: none;
    }
    .error-link:hover { text-decoration: underline; }
    .error-illustration {
      display: block;
      max-width: 280px;
      width: 60%;
      height: auto;
      margin: 0 auto var(--space-5);
      border-radius: 8px;
      opacity: 0;
      animation: gentleBloom 0.8s cubic-bezier(0.2, 0, 0.2, 1) 0.15s forwards;
      box-shadow: var(--shadow-md);
    }
    html[data-theme="dark"] .error-illustration { box-shadow: var(--shadow-lg); }
    @keyframes gentleBloom { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>
  <div id="webgl-atmosphere" data-scene="login" aria-hidden="true"></div>
  <div id="app" role="main">
    <div class="error-wrap">
      <img src="/static/illustrations/error-page.webp" alt="" class="error-illustration" aria-hidden="true">
      <h1 class="error-title">Something went wrong.</h1>
      <p class="error-sub">We're looking into it.</p>
      <a href="/" class="error-link">Return to the dashboard</a>
    </div>
  </div>
  <script>
    (function() {
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      if (isDark) {
        document.querySelectorAll('.error-illustration').forEach(function(img) {
          img.src = img.src.replace(/\.webp$/, '-dark.webp');
        });
      }
    })();
  </script>
  <script src="/static/webgl/three.min.js" async></script>
  <script src="/static/webgl/ink-atmosphere.js" defer></script>
</body>
</html>
