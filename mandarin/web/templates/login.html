<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Mandarin</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Source+Serif+4:wght@400;600&display=swap">
  <link rel="stylesheet" href="/static/style.css?v={{ static_hash('style.css') }}">
  <style nonce="{{ csp_nonce }}">
    .auth-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: var(--space-4); }
    .auth-card { width: 100%; max-width: 400px; }
    .auth-logo { text-align: center; margin-bottom: var(--space-6); }
    .auth-logo .logo-mark { font-size: var(--text-display); font-family: var(--font-hanzi); color: var(--color-accent); }
    .auth-logo .logo-text { font-family: var(--font-heading); font-size: var(--text-2xl); color: var(--color-text); margin-top: var(--space-1); letter-spacing: var(--tracking-wide); }
    .auth-form { display: flex; flex-direction: column; gap: var(--space-4); }
    .auth-field label { display: block; font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-dim); margin-bottom: var(--space-1); letter-spacing: var(--tracking-wide); text-transform: uppercase; }
    .auth-field input { width: 100%; padding: 12px 16px; font-family: var(--font-body); font-size: var(--text-base); border: 1px solid var(--color-divider); border-radius: 6px; background: var(--color-surface); color: var(--color-text); transition: border-color 0.2s; box-sizing: border-box; }
    .auth-field input:focus { outline: none; border-color: var(--color-accent); }
    .auth-submit { padding: var(--btn-padding); font-family: var(--font-heading); font-size: var(--text-lg); background: var(--color-accent); color: var(--color-surface); border: none; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; letter-spacing: var(--tracking-normal); }
    .auth-submit:hover { opacity: 0.9; }
    .auth-links { text-align: center; margin-top: var(--space-4); font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-dim); }
    .auth-links a { color: var(--color-accent); text-decoration: none; }
    .auth-links a:hover { text-decoration: underline; }
    .flash-messages { list-style: none; padding: 0; margin: 0 0 var(--space-4); }
    .flash-messages li { padding: 10px 14px; border-radius: 6px; font-family: var(--font-body); font-size: var(--text-sm); margin-bottom: var(--space-2); }
    .flash-error { background: #F0E0DD; color: var(--color-incorrect); }
    .flash-info { background: #DDE8DD; color: var(--color-correct); }
  </style>
  {% if plausible_domain %}<script defer data-domain="{{ plausible_domain }}" src="{{ plausible_script_url }}"></script>{% endif %}
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark" aria-hidden="true">漫</div>
        <div class="logo-text">Mandarin</div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <ul class="flash-messages" role="alert" aria-live="assertive">
        {% for category, message in messages %}
        <li class="flash-{{ category }}">{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %}
      {% endwith %}

      <form class="auth-form" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="auth-field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" value="{{ email }}" required autofocus autocomplete="email">
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="auth-submit">Sign In</button>
      </form>

      <div class="auth-links">
        <p>No account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
        <p><a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a></p>
      </div>
    </div>
  </div>
</body>
</html>
