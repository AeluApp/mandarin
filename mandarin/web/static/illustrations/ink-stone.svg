  <!-- ink drops -->
  <circle cx="70" cy="46" r="0.6" stroke-width="0.4"/>
  <circle cx="73" cy="47.5" r="0.4" stroke-width="0.4"/>
  <circle cx="38" cy="47" r="0.5" stroke-width="0.4"/>
</svg>
