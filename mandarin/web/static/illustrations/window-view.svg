<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60" fill="none" stroke="currentColor">
  <!-- window frame -->
  <rect x="25" y="8" width="70" height="44" stroke-width="0.75"/>
  <!-- window sill -->
  <line x1="22" y1="52" x2="98" y2="52" stroke-width="0.6"/>
  <!-- horizon inside window -->
  <line x1="25" y1="38" x2="95" y2="38" stroke-width="0.4"/>
  <!-- distant mountain inside window -->
