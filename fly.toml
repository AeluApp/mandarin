app = "aelu-app"
primary_region = "ewr"

[build]

[env]
  IS_PRODUCTION = "true"
  PORT = "8080"
  DATA_DIR = "/data"
  ADMIN_EMAIL = "jason.gerson@gmail.com"

# Required secrets (set via `fly secrets set`):
#   SECRET_KEY, JWT_SECRET, STRIPE_SECRET_KEY, RESEND_API_KEY,
#   LITESTREAM_S3_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
# Optional secrets:
#   ADMIN_EMAIL, PLAUSIBLE_API_KEY, PLAUSIBLE_DOMAIN, SENTRY_DSN

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/api/health/ready"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2048mb"

[mounts]
  source = "mandarin_data"
  destination = "/data"
