    verify: "All six shadow tokens defined: --shadow-xs, --shadow-sm, --shadow-md, --shadow-lg, --shadow-xl, --shadow-2xl"
    selector: ":root"

  - check: "Light shadow color is slate-blue tinted"
    expected: "rgba(42, 54, 80, 0.04)"
    selector: ":root"
    property: "--color-shadow"

  - check: "Shadow-lg includes both depth layers"
    expected: "0 8px 24px rgba(0, 0, 0, 0.08), 0 2px 8px var(--color-shadow)"
    selector: ":root"
    property: "--shadow-lg"

responsive:
