    verify: "scrollbar-gutter: stable"

platform_parity:
  flutter:
    - check: "Flutter light base matches web"
      expected_flutter: "Color(0xFFF2EBE0)"
      expected_web: "#F2EBE0"
      flutter_file: "flutter_app/lib/theme/aelu_colors.dart"
      flutter_const: "AeluColors.baseLight"

    - check: "Flutter dark base matches web"
      expected_flutter: "Color(0xFF1C2028)"
      expected_web: "#1C2028"
      flutter_const: "AeluColors.baseDark"

    - check: "Flutter accent matches web"
      expected_flutter: "Color(0xFF946070)"
      expected_web: "#946070"
      flutter_const: "AeluColors.accent"

    - check: "Flutter spring curve matches web"
      expected_flutter: "Cubic(0.34, 1.56, 0.64, 1)"
      expected_web: "cubic-bezier(0.34, 1.56, 0.64, 1)"
      flutter_const: "AeluTheme.springCurve"

    - check: "Flutter glass blur sigma matches web 20px"
      expected_flutter: "ImageFilter.blur(sigmaX: 20, sigmaY: 20)"
      expected_web: "blur(20px)"
      flutter_const: "AeluTheme.glassBlur"

    - check: "Flutter glass opacity matches web 78%/88%"
      expected_light: "0.78 opacity"
      expected_dense: "0.88 opacity"
      flutter_const: "AeluColors.glassBgLight / glassBgDenseLight"

    - check: "Flutter heading font is Cormorant Garamond"
