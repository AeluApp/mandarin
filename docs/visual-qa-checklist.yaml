      flutter_file: "flutter_app/lib/theme/aelu_theme.dart"
      verify: "displayLarge, displayMedium, headlineLarge, headlineMedium all use CormorantGaramond"

    - check: "Flutter body font is Source Serif 4"
      expected: "SourceSerif4"
      verify: "titleLarge, titleMedium use SourceSerif4"

    - check: "Flutter 6-level shadow scale matches web"
      verify: "shadowsLight and shadowsDark arrays each have 6 entries (xs through 2xl) with matching blur radii and offsets"
      flutter_file: "flutter_app/lib/theme/aelu_theme.dart"

    - check: "Flutter interactive radius is 12px"
      expected: "BorderRadius.all(Radius.circular(12))"
      flutter_const: "AeluTheme._interactiveRadius"

    - check: "Flutter press scale matches web"
      expected: "0.98"
      flutter_const: "AeluTheme.pressScale"
      note: "Web uses scale(0.95) on .btn-primary:active but 0.98 on #btn-submit:active"

brand_constraints:
  - check: "No card borders on structural elements"
    verify: ".panel has border: none (only border-top for horizon line). No box or card-style borders on dashboard panels."
    note: "Brand: continuous plaster surface"

  - check: "Radius zero on structural/decorative elements"
    verify: "--radius: 0 used on .panel, .stat, .msg-hanzi, #answer-input, .error-tag"
    note: "Brand: radius zero. Only interactive elements get radius (buttons get --radius-lg: 6px, cards get --radius-card: 8px)"

  - check: "No praise inflation in color semantics"
    verify: "Correct feedback uses muted sage (#5A7A5A), not bright green. Streak stat-value uses --color-text, not gold/accent."
    note: "Brand: data-grounded, no theatrics"

  - check: "Motion decelerates into rest"
    verify: "Primary easing --ease-upward uses cubic-bezier(0.16, 1, 0.3, 1) — fast start, gentle settle. No bounce except spring on button release."
    note: "Brand: things arrive, they don't pop"

  - check: "Borders are transparent by default"
    expected: "transparent"
    selector: ":root"
    property: "--color-border"
    note: "Brand: continuous surface, borders only via divider horizon lines"

  - check: "Incorrect is warm brown, never red"
    verify: "Light: #806058, Dark: #A8988E — warm earth tone, not alarm"
    note: "Brand: acknowledges difficulty without framing it as failure"
