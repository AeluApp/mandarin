# Visual QA Checklist — Aelu
# Machine-readable verification points for AI agents
# Run after any CSS, JS, or theme change
#
# Source of truth: mandarin/web/static/design-tokens.json
# CSS: mandarin/web/static/style.css
# Flutter: flutter_app/lib/theme/aelu_theme.dart, aelu_colors.dart
# JS: mandarin/web/static/visual-elevation.js

version: "1.0"
last_updated: "2026-03-24"

