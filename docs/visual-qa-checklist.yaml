    property: "--color-base"
    note: "Deep indigo — warm dark, not pure black"

  - check: "Dark mode text color"
    expected: "#E4DDD0"
    selector: "html[data-theme='dark']"
    property: "--color-text"
    note: "Warm cream — not pure white"

  - check: "Dark mode accent shifts warmer"
    expected: "#B07888"
    selector: "html[data-theme='dark']"
    property: "--color-accent"

  - check: "Dark mode divider color"
    expected: "#3A3530"
    selector: "html[data-theme='dark']"
    property: "--color-divider"

  - check: "Dark mode shadows are deeper"
    expected: "0 8px 24px rgba(0, 0, 0, 0.2), 0 2px 8px rgba(0, 0, 0, 0.12)"
    selector: "html[data-theme='dark']"
    property: "--shadow-lg"

  - check: "Dark mode glass uses surfaceAlt at 72% opacity"
    expected: "color-mix(in srgb, var(--color-surface-alt) 72%, transparent)"
    selector: "html[data-theme='dark']"
    property: "--glass-bg"

  - check: "Dark mode PNG illustrations invert and screen blend"
    selector: "html[data-theme='dark'] .dashboard-illustration[src$='.png']"
