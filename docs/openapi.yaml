                properties:
                  voice:
                    type: string
    post:
      tags: [TTS]
      summary: Set preferred TTS voice
      operationId: setVoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [voice]
              properties:
                voice:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  voice:
                    type: string
        "400":
          description: Invalid voice name

