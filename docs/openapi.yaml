components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: Flask session cookie set on login
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from /api/auth/token

  schemas:
    StatusOk:
      type: object
      properties:
        status:
          type: string
          example: ok

    Error:
      type: object
      properties:
        error:
          type: string

    ApiError:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
          description: Machine-readable error code

    UpgradeRequired:
      type: object
      properties:
        error:
          type: string
          example: upgrade_required
        feature:
          type: string
          description: Feature name that requires upgrade

    HealthFull:
      type: object
      properties:
        status:
          type: string
          example: ok
        schema_version:
          type: integer
        schema_current:
          type: boolean
        item_count:
          type: integer
        tables:
          type: integer
        uptime_seconds:
          type: integer
        latency_ms:
          type: number

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          description: Seconds until access token expires
        user:
          type: object
          properties:
            id:
              type: integer
            email:
              type: string
            display_name:
              type: string
            subscription_tier:
              type: string

    MfaRequired:
      type: object
      properties:
        mfa_required:
          type: boolean
          example: true
        mfa_token:
          type: string
          description: Short-lived token to complete MFA (5 min expiry)

    SessionSummary:
      type: object
      properties:
        id:
          type: integer
        started_at:
          type: string
          format: date-time
        session_type:
          type: string
        items_completed:
          type: integer
        items_correct:
          type: integer
        early_exit:
          type: boolean
        duration_seconds:
          type: integer
          nullable: true

    MasteryCriteria:
      type: object
      properties:
        item_id:
          type: integer
        mastery_stage:
          type: string
        difficulty:
          type: number
        gates:
          type: object
          properties:
            streak:
              $ref: "#/components/schemas/Gate"
            attempts:
              $ref: "#/components/schemas/Gate"
            diversity:
              $ref: "#/components/schemas/Gate"
            days:
              $ref: "#/components/schemas/Gate"
        gates_met:
          type: integer
        summary:
          type: string

    Gate:
      type: object
      properties:
        current:
          type: integer
        needed:
          type: integer
        met:
          type: boolean

    PassageSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        title_zh:
          type: string
        hsk_level:
          type: integer

    Passage:
      type: object
      description: Full reading passage with text, pinyin, translation, and glosses

    MediaRecommendation:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        hsk_level:
          type: integer
        media_type:
          type: string
        cost:
          type: string
        content_lenses:
          type: array
          items:
            type: string
        segment:
          type: object
        where_to_find:
          type: string
        cultural_note:
          type: string
        times_watched:
          type: integer
        avg_score:
          type: number
          nullable: true
        liked:
          type: boolean
          nullable: true
        has_quiz:
          type: boolean

    ListeningPassage:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        title_zh:
          type: string
        hsk_level:
          type: integer
        text_zh:
          type: string
        text_pinyin:
          type: string
        text_en:
          type: string
        questions:
          type: array
          items:
            type: object

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Authentication required
