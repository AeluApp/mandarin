              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  build_id:
                    type: string

  # ── TTS / Audio ──────────────────────────────────────────────────

  /api/tts:
    get:
      tags: [TTS]
      summary: Generate TTS audio and return file directly
      operationId: ttsGet
      parameters:
        - name: text
          in: query
          required: true
          schema:
            type: string
        - name: rate
          in: query
          schema:
            type: integer
        - name: voice
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Audio file
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        "400":
          description: Invalid text
        "503":
          description: TTS unavailable
    post:
      tags: [TTS]
      summary: Generate TTS audio and return URL
      operationId: ttsPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                rate:
                  type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
        "400":
          description: Invalid text
        "503":
          description: TTS unavailable

  /api/audio/{filename}:
    get:
      tags: [TTS]
      summary: Serve a generated TTS audio file
      operationId: serveAudio
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audio file (MP3, WAV, or AIFF)
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        "404":
          description: File not found

  /api/settings/voice:
