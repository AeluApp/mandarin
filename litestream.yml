dbs:
  - path: /data/mandarin.db
    replicas:
      - type: s3
        bucket: ${LITESTREAM_S3_BUCKET}
        path: mandarin
        region: ${AWS_REGION}
        endpoint: ${AWS_ENDPOINT_URL_S3}
        access-key-id: ${AWS_ACCESS_KEY_ID}
        secret-access-key: ${AWS_SECRET_ACCESS_KEY}
        retention: 720h
        snapshot-interval: 24h
        validation-interval: 6h
