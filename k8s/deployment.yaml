apiVersion: apps/v1
kind: Deployment
metadata:
  name: mandarin
  labels:
    app: mandarin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mandarin
  template:
    metadata:
      labels:
        app: mandarin
    spec:
      containers:
        - name: app
          image: mandarin-app:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: mandarin-config
            - secretRef:
                name: mandarin-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
        - name: litestream
          image: litestream/litestream:0.3
          args: ["replicate"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mandarin-data
        - name: litestream-config
          configMap:
            name: mandarin-config
            items:
              - key: litestream.yml
                path: litestream.yml
