<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漫 Aelu</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Serif+SC:wght@700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F2EBE0;
      color: #2A3650;
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .icon {
      font-family: 'Noto Serif SC', 'PingFang SC', serif;
      font-size: 72px;
      font-weight: 700;
      color: #946070;
      margin-bottom: 16px;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #2A3650;
      letter-spacing: 0.15em;
      margin-bottom: 32px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(148, 96, 112, 0.2);
      border-top-color: #946070;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      font-size: 14px;
      color: #5A6678;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>
  <div class="icon">漫</div>
  <div class="title">Aelu</div>
  <div class="spinner"></div>
  <div class="status" id="status">Starting...</div>
  <script>
    const HEALTH_URL = 'http://localhost:5173/api/health';
    const APP_URL = 'http://localhost:5173/';
    const MAX_ATTEMPTS = 60;
    const POLL_MS = 300;

    let attempts = 0;
    function pollHealth() {
      attempts++;
      fetch(HEALTH_URL)
        .then(r => {
          if (r.ok) {
            document.getElementById('status').textContent = 'Loading...';
            window.location.replace(APP_URL);
          } else {
            retry();
          }
        })
        .catch(() => retry());
    }

    function retry() {
      if (attempts >= MAX_ATTEMPTS) {
        document.getElementById('status').textContent = 'Failed to start. Please relaunch.';
        return;
      }
      setTimeout(pollHealth, POLL_MS);
    }

    // Start polling after a brief delay for the sidecar to initialize
    setTimeout(pollHealth, 500);
  </script>
</body>
</html>
