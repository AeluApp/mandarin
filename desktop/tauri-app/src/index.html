<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>漫 Mandarin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }
    .icon {
      font-size: 72px;
      color: #bb86fc;
      margin-bottom: 16px;
    }
    .title {
      font-size: 24px;
      font-weight: 600;
      color: #bb86fc;
      margin-bottom: 32px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(187, 134, 252, 0.2);
      border-top-color: #bb86fc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="icon">漫</div>
  <div class="title">Mandarin</div>
  <div class="spinner"></div>
  <div class="status" id="status">Starting...</div>
  <script>
    const HEALTH_URL = 'http://127.0.0.1:5173/api/health';
    const APP_URL = 'http://localhost:5173/';
    const MAX_ATTEMPTS = 60;
    const POLL_MS = 300;

    let attempts = 0;
    function pollHealth() {
      attempts++;
      fetch(HEALTH_URL)
        .then(r => {
          if (r.ok) {
            document.getElementById('status').textContent = 'Loading...';
            window.location.href = APP_URL;
          } else {
            retry();
          }
        })
        .catch(() => retry());
    }

    function retry() {
      if (attempts >= MAX_ATTEMPTS) {
        document.getElementById('status').textContent = 'Failed to start. Please relaunch.';
        return;
      }
      setTimeout(pollHealth, POLL_MS);
    }

    // Start polling after a brief delay for the sidecar to initialize
    setTimeout(pollHealth, 500);
  </script>
</body>
</html>
